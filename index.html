<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1916;
      --surface2: #242220;
      --border: #2e2c29;
      --accent: #c8a96e;
      --accent-dim: #8a6f42;
      --text: #f0ece4;
      --text-dim: #8a857c;
      --red: #c97062;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 10px;
      font-weight: 300;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent-dim);
      margin: 20px auto 0;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 36px;
    }

    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-dim);
    }

    select option { background: var(--surface2); }

    textarea { resize: vertical; min-height: 68px; }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0f0e0c;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 6px;
    }

    .add-btn:hover { opacity: 0.88; }
    .add-btn:active { transform: scale(0.98); }

    /* Meals list */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
    }

    .count-badge {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .empty-state {
      text-align: center;
      padding: 52px 20px;
      color: var(--text-dim);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    .empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }

    .meal-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .meal-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .meal-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .badge-type { background: #2a2420; color: var(--accent); }
    .badge-flight { background: #1e2129; color: #7a9ec7; }

    .meal-notes {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 5px;
      line-height: 1.5;
    }

    .meal-time {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      padding-top: 3px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: var(--red); }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    @media (max-width: 480px) {
      .fields { grid-template-columns: 1fr; }
      .field.full { grid-column: 1; }
    }
  </style>
</head>
<body>

  <header>
    <p class="tagline">Inflight Dining Log</p>
    <h1>Meal <span>Tracker</span></h1>
    <p class="subtitle">Log what you've been served in the air</p>
    <div class="divider"></div>
  </header>

  <div class="container">

    <!-- Form -->
    <div class="form-card">
      <h2>Log a Meal</h2>
      <div class="fields">
        <div class="field full">
          <label>Meal Name</label>
          <input type="text" id="mealName" placeholder="e.g. Chicken Tikka Masala" />
        </div>
        <div class="field">
          <label>Meal Type</label>
          <select id="mealType">
            <option value="">Select type</option>
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Snack</option>
            <option>Beverage</option>
          </select>
        </div>
        <div class="field">
          <label>Flight / Route</label>
          <input type="text" id="flightRoute" placeholder="e.g. AC837 YYZ→NRT" />
        </div>
        <div class="field full">
          <label>Notes (optional)</label>
          <textarea id="notes" placeholder="Rating, comments, would you order again…"></textarea>
        </div>
      </div>
      <button class="add-btn" onclick="addMeal()">+ Add to Log</button>
    </div>

    <!-- Meals list -->
    <div class="section-header">
      <h2>Your Log</h2>
      <div style="display:flex;gap:12px;align-items:center;">
        <span class="count-badge" id="countBadge">0 meals</span>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>
    </div>

    <div id="mealList"></div>

  </div>

  <script>
    let meals = JSON.parse(localStorage.getItem('flightMeals') || '[]');

    function save() {
      localStorage.setItem('flightMeals', JSON.stringify(meals));
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' })
           + ' · ' + d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
    }

    function render() {
      const list = document.getElementById('mealList');
      const badge = document.getElementById('countBadge');
      badge.textContent = meals.length + (meals.length === 1 ? ' meal' : ' meals');

      if (meals.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">✈️</div>No meals logged yet.<br>Add your first inflight meal above.</div>`;
        return;
      }

      list.innerHTML = meals.map((m, i) => `
        <div class="meal-item">
          <div>
            <div class="meal-name">${esc(m.name)}</div>
            <div class="meal-meta">
              ${m.type   ? `<span class="badge badge-type">${esc(m.type)}</span>` : ''}
              ${m.flight ? `<span class="badge badge-flight">${esc(m.flight)}</span>` : ''}
            </div>
            ${m.notes ? `<div class="meal-notes">${esc(m.notes)}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <span class="meal-time">${formatTime(m.ts)}</span>
            <button class="delete-btn" onclick="deleteMeal(${i})" title="Remove">✕</button>
          </div>
        </div>
      `).join('');
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addMeal() {
      const name = document.getElementById('mealName').value.trim();
      if (!name) { document.getElementById('mealName').focus(); return; }

      meals.unshift({
        name,
        type:   document.getElementById('mealType').value,
        flight: document.getElementById('flightRoute').value.trim(),
        notes:  document.getElementById('notes').value.trim(),
        ts:     Date.now()
      });

      save();
      render();

      document.getElementById('mealName').value = '';
      document.getElementById('mealType').value = '';
      document.getElementById('flightRoute').value = '';
      document.getElementById('notes').value = '';
    }

    function deleteMeal(i) {
      meals.splice(i, 1);
      save();
      render();
    }

    function clearAll() {
      if (meals.length === 0) return;
      if (confirm('Clear all logged meals?')) {
        meals = [];
        save();
        render();
      }
    }

    // Allow Enter key on meal name to submit
    document.getElementById('mealName').addEventListener('keydown', e => {
      if (e.key === 'Enter') addMeal();
    });

    render();
  </script>

</body>
</html>
